<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sujay's Website</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

header{
    padding:30px;
    background:rgba(0,0,0,0.5);
}

h1{
    font-size:50px;
}

p{
    font-size:20px;
    margin-top:10px;
}

section{
    padding:40px;
}

.card{
    display:inline-block;
    width:280px;
    margin:20px;
    padding:20px;
    border-radius:15px;
    background:rgba(255,255,255,0.1);
    transition:.3s;
}

.card:hover{
    transform:scale(1.05);
    background:rgba(255,255,255,0.2);
}

button{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#00d9ff;
    color:black;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:yellow;
}

footer{
    margin-top:40px;
    padding:20px;
    background:black;
}

#clock{
    font-size:35px;
    margin-top:20px;
    color:#00ffcc;
}
</style>

</head>
<body>

<header>
<h1>🎮 Welcome to Sujay's Website 🚀</h1>
<p>Gaming • Study • Fun • HTML Learning</p>
</header>

<section>

<div class="card">
<h2>🎮 Gaming</h2>
<p>Play games and enjoy your free time.</p>
<button onclick="alert('Welcome to Gaming!')">Open</button>
</div>

<div class="card">
<h2>📚 Study</h2>
<p>Learn HTML, CSS and JavaScript easily.</p>
<button onclick="alert('Time to Study!')">Study</button>
</div>

<div class="card">
<h2>💻 Coding</h2>
<p>Create amazing websites using Notepad.</p>
<button onclick="alert('Happy Coding!')">Code</button>
</div>

<h2 style="margin-top:40px;">🕒 Current Time</h2>
<div id="clock"></div>

</section>

<footer>
<p>© 2026 Sujay's Website | Made with HTML, CSS & JavaScript</p>
</footer>

<script>
function updateClock(){
    const now=new Date();
    document.getElementById("clock").innerHTML=now.toLocaleTimeString();
}
setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
